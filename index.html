<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <header class="bg-secondary text-white py-3 shadow-sm mb-4">
        <div class="container text-center">
            <h1 class="mb-0">Noticias</h1>
        </div>
    </header>
    <main class="container">
        
            <div class="card-body">

                <form id="newsForm" class="row g-3 align-items-end">

                    <div class="col-md-4">
                        <label for="query" class="form-label fw-semibold">Palabra:</label>
                        <input type="text" id="query" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label for="from" class="form-label fw-semibold">Desde:</label>
                        <input type="date" id="from" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label for="to" class="form-label fw-semibold">Hasta:</label>
                        <input type="date" id="to" class="form-control">
                    </div>

                    <div class="col-md-2">
                       <button type="submit" class="btn btn-secondary w-100">Buscar</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="alertaContainer" class="mb-3"></div>
        <div id="resultados" class="row g-4">
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>

</body>
</html>
